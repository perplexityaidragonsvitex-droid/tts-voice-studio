<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#grad)"/>
  <!-- Wave icon -->
  <g fill="white">
    <!-- Center wave -->
    <path d="M256 120 L256 392" stroke="white" stroke-width="32" stroke-linecap="round" opacity="0.9"/>
    <!-- Left waves -->
    <path d="M176 180 L176 332" stroke="white" stroke-width="24" stroke-linecap="round" opacity="0.7"/>
    <path d="M96 220 L96 292" stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.5"/>
    <!-- Right waves -->
    <path d="M336 180 L336 332" stroke="white" stroke-width="24" stroke-linecap="round" opacity="0.7"/>
    <path d="M416 220 L416 292" stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
