<!DOCTYPE html>
<html>
<head>
<style>
html { background: #FFFFFF; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  background: #FFFFFF;
}
.header {
  background: #0066CC;
  padding: 12pt 30pt;
}
.header-title {
  color: #FFFFFF;
  font-size: 22pt;
  font-weight: bold;
  margin: 0;
}
.content {
  display: flex;
  flex-wrap: wrap;
  padding: 12pt 20pt;
  gap: 10pt;
}
.card {
  width: 200pt;
  background: #F5F7FA;
  border-radius: 4pt;
  padding: 8pt;
  border-top: 2pt solid #0066CC;
}
.card-icon {
  font-size: 18pt;
  margin-bottom: 4pt;
}
.card-title {
  color: #0066CC;
  font-size: 10pt;
  font-weight: bold;
  margin: 0 0 2pt 0;
}
.card-text {
  color: #555555;
  font-size: 8pt;
  line-height: 1.2;
  margin: 0;
}
</style>
</head>
<body>
<div class="header">
  <h1 class="header-title">Возможности</h1>
</div>
<div class="content">
  <div class="card">
    <p class="card-icon">🎤</p>
    <p class="card-title">Синтез речи</p>
    <p class="card-text">Генерация аудио из текста</p>
  </div>
  <div class="card">
    <p class="card-icon">🎭</p>
    <p class="card-title">Эмоции</p>
    <p class="card-text">Разные стили произношения</p>
  </div>
  <div class="card">
    <p class="card-icon">📊</p>
    <p class="card-title">История</p>
    <p class="card-text">Сохранение генераций</p>
  </div>
  <div class="card">
    <p class="card-icon">📱</p>
    <p class="card-title">PWA</p>
    <p class="card-text">Установка как приложение</p>
  </div>
  <div class="card">
    <p class="card-icon">🔒</p>
    <p class="card-title">Безопасность</p>
    <p class="card-text">Защита паролем</p>
  </div>
  <div class="card">
    <p class="card-icon">📤</p>
    <p class="card-title">Telegram</p>
    <p class="card-text">Интеграция для анонсов</p>
  </div>
</div>
</body>
</html>
