<!DOCTYPE html>
<html>
<head>
<style>
html { background: #FFFFFF; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  background: #FFFFFF;
}
.header {
  background: #0066CC;
  padding: 12pt 30pt;
}
.header-title {
  color: #FFFFFF;
  font-size: 22pt;
  font-weight: bold;
  margin: 0;
}
.content {
  display: flex;
  padding: 15pt 30pt;
  gap: 20pt;
  align-items: center;
}
.left-col { flex: 1; }
.right-col {
  flex: 0.8;
  display: flex;
  justify-content: center;
  align-items: center;
}
.desc {
  color: #333333;
  font-size: 11pt;
  line-height: 1.3;
  margin: 0 0 12pt 0;
}
.feature-item {
  display: flex;
  align-items: center;
  margin: 6pt 0;
  padding: 6pt 10pt;
  background: #F5F7FA;
  border-radius: 4pt;
  border-left: 3pt solid #0066CC;
}
.feature-text {
  color: #333333;
  font-size: 10pt;
  margin: 0;
}
.check {
  color: #0066CC;
  font-size: 12pt;
  margin-right: 8pt;
}
</style>
</head>
<body>
<div class="header">
  <h1 class="header-title">Telegram интеграция</h1>
</div>
<div class="content">
  <div class="left-col">
    <p class="desc">Автоматическая отправка аудиосообщений в Telegram-каналы.</p>
    <div class="feature-item">
      <p class="check">✓</p>
      <p class="feature-text">Настройка бота и канала</p>
    </div>
    <div class="feature-item">
      <p class="check">✓</p>
      <p class="feature-text">Автоотправка анонсов</p>
    </div>
    <div class="feature-item">
      <p class="check">✓</p>
      <p class="feature-text">Отправка с текстом или без</p>
    </div>
    <div class="feature-item">
      <p class="check">✓</p>
      <p class="feature-text">История всех отправок</p>
    </div>
  </div>
  <div class="right-col">
    <img src="/home/z/my-project/presentation/slides/telegram-icon.png" style="width: 100pt; height: 100pt; opacity: 0.8;">
  </div>
</div>
</body>
</html>
