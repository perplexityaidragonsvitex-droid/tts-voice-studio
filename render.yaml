# ===========================================
# Render Blueprint - СПС Голосовая Студия
# Автоматический деплой с GitHub
# Оптимизировано для free tier (512MB RAM)
# ===========================================

services:
  # ===========================================
  # Web Service: Next.js + Python TTS
  # ===========================================
  - type: web
    name: tts-voice-studio
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    
    # Ресурсы
    plan: free
    region: oregon
    
    # Health check
    healthCheckPath: /api/auth
    
    # Переменные окружения
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: PYTHONIOENCODING
        value: utf-8
      - key: TTS_SERVICE_URL
        value: http://localhost:3031
      - key: APP_PASSWORD
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: "file:/app/data/tts.db"
